version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ETH_RPC=${ETH_RPC:-https://eth.llamarpc.com}
      - BSC_RPC=${BSC_RPC:-https://bsc-dataseed.binance.org}
      - POLYGON_RPC=${POLYGON_RPC:-https://polygon.llamarpc.com}
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
